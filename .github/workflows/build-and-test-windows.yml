name: Build and test Windows

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ['windows-latest']
        perl: ['5.42', '5.40', '5.38', '5.36', '5.34', '5.32', '5.30']
    name: Perl ${{ matrix.perl }} on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Run tests (no coverage)
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - run: perl -V

      - name: Install dependencies
        run: |
          Get-Content cpanfile |
            Where-Object { $_ -notmatch "requires 'JSONLD';" } |
            Set-Content cpanfile.windows
          cpanm -n --installdeps --cpanfile cpanfile.windows .
        shell: pwsh

      - run: prove -l t
