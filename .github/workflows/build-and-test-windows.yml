name: Build and test Windows

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ['windows-latest']
        perl: ['5.42', '5.40', '5.38', '5.36', '5.34', '5.32', '5.30']
    name: Perl ${{ matrix.perl }} on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Run tests (no coverage)
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - run: perl -V

      - name: Install dependencies
        run: |
          # Install the Windows troublemakers explicitly first so the logs show
          # the real failing module instead of only the final --installdeps
          # summary. cpanfile.windows keeps the Windows CI dependency policy
          # explicit, including the current JSONLD exclusion.
          cpanm --verbose -n DateTime::Format::ISO8601
          cpanm --verbose -n DBD::SQLite
          cpanm --verbose -n --installdeps --cpanfile cpanfile.windows .
        shell: pwsh

      - run: prove -l t
