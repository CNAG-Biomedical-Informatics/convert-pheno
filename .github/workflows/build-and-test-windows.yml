name: Build and test Windows

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ['windows-latest']
        perl: ['5.42', '5.40']
    name: Perl ${{ matrix.perl }} on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Run tests (no coverage)
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - run: perl -V

      - name: Clean repo-local Perl libs
        run: |
          # Avoid loading stale XS artifacts from a repo-local local/ tree
          # built under a different Perl version.
          if (Test-Path local) { Remove-Item -Recurse -Force local }
        shell: pwsh

      - name: Install dependencies
        env:
          PERL5LIB: ""
        run: |
          # Install the Windows troublemakers explicitly first so the logs show
          # the real failing module instead of only the final --installdeps
          # summary. cpanfile.windows keeps the Windows CI dependency policy
          # explicit, including the current JSONLD exclusion.
          $localArgs = @('--local-lib-contained', 'local')

          function Show-CpanmLogs {
            Get-ChildItem "$env:USERPROFILE\\.cpanm\\work" -Recurse -Filter build.log -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 5 |
              ForEach-Object {
                Write-Host ""
                Write-Host "===== $($_.FullName) ====="
                Get-Content $_.FullName -Tail 200
              }
          }

          cpanm @localArgs --verbose -n DateTime::Locale@1.44
          if ($LASTEXITCODE -ne 0) { Show-CpanmLogs; exit $LASTEXITCODE }

          cpanm @localArgs --verbose -n DateTime@1.65
          if ($LASTEXITCODE -ne 0) { Show-CpanmLogs; exit $LASTEXITCODE }

          cpanm @localArgs --verbose -n DateTime::Format::ISO8601@0.19
          if ($LASTEXITCODE -ne 0) { Show-CpanmLogs; exit $LASTEXITCODE }

          cpanm @localArgs --verbose -n DBD::SQLite@1.72
          if ($LASTEXITCODE -ne 0) { Show-CpanmLogs; exit $LASTEXITCODE }

          cpanm @localArgs --verbose -n --installdeps --cpanfile cpanfile.windows .
          if ($LASTEXITCODE -ne 0) { Show-CpanmLogs; exit $LASTEXITCODE }
        shell: pwsh

      - run: prove -l t
        env:
          PERL5LIB: D:\a\convert-pheno\convert-pheno\local\lib\perl5;D:\a\convert-pheno\convert-pheno\local\lib\perl5\MSWin32-x64-multi-thread
