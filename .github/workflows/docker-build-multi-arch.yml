name: Docker build (multi-arch)

on:
  push:
    tags:
      - "*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read build metadata
        id: build_metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          test -n "$version"
          git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          if [[ "$(git cat-file -t "refs/tags/$RELEASE_TAG")" != "tag" ]]; then
            echo "Docker release tag $RELEASE_TAG must be annotated" >&2
            exit 1
          fi
          if [[ "$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")" != "$(git rev-parse HEAD)" ]]; then
            echo "Checked-out commit does not match Docker release tag $RELEASE_TAG" >&2
            exit 1
          fi
          if [[ "$RELEASE_TAG" != "$version" ]]; then
            echo "Docker tag $RELEASE_TAG does not match VERSION $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            manuelrueda/convert-pheno:${{ steps.build_metadata.outputs.version }}
            manuelrueda/convert-pheno:latest
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=${{ steps.build_metadata.outputs.version }}
            VCS_REF=${{ steps.build_metadata.outputs.revision }}
          labels: |
            org.opencontainers.image.title=Convert-Pheno
            org.opencontainers.image.description=Clinical and phenotypic data model converter
            org.opencontainers.image.source=https://github.com/CNAG-Biomedical-Informatics/convert-pheno
            org.opencontainers.image.version=${{ steps.build_metadata.outputs.version }}
            org.opencontainers.image.revision=${{ steps.build_metadata.outputs.revision }}
            org.opencontainers.image.licenses=Artistic-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
